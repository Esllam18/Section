name: section
description: Medical students ecosystem — store, community, AI assistant, study resources
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Backend
  supabase_flutter: ^2.5.6

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0
  gap: ^3.0.1
  flutter_staggered_grid_view: ^0.7.0
  percent_indicator: ^4.2.3

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Network
  dio: ^5.6.0
  http: ^1.2.2
  connectivity_plus: ^7.1.1

  # File
  file_picker: ^8.1.2
  open_filex: ^4.5.0
  url_launcher: ^6.3.0

  # Auth
  google_sign_in: ^6.2.1

  # AI / Markdown
  flutter_markdown: ^0.7.3

  # Utils
  intl:
  uuid: ^4.5.1
  timeago: ^3.7.0
  crypto: ^3.0.3
  formz: ^0.7.0

  # Payment
  webview_flutter: ^4.8.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  firebase_analytics: ^11.3.3

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/lang/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
