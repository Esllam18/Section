name: section
description: "Section — The complete medical student community app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Backend ───────────────────────────────────────────────────────
  supabase_flutter: ^2.5.6
  google_sign_in: ^6.2.1

  # ── Local Storage ─────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── UI / Animations ───────────────────────────────────────────────
  lottie: ^3.1.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # ── Utilities ─────────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/lottie/
    - assets/images/
